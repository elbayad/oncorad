<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration Tablette - Oncorad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            color: #f1f5f9;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bloc-option:checked+label {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .uuid-fluo {
            color: #39FF14 !important;
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.5);
            border-color: rgba(57, 255, 20, 0.3) !important;
            background: rgba(57, 255, 20, 0.1) !important;
        }
    </style>
</head>

<body class="flex items-center justify-center p-6">
    <div class="w-full max-w-lg">
        <div class="glass-card rounded-3xl p-8 shadow-2xl">
            <header class="text-center mb-10">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-900/40">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Configuration Tablette</h1>
                <p class="text-slate-400 text-sm">Initialisation du terminal de bloc</p>
                <div id="device-info"
                    class="mt-4 text-[10px] font-mono text-slate-500 uppercase tracking-widest bg-slate-900/50 py-1 px-3 rounded-full inline-block border border-transparent transition-all duration-500">
                    ID: CHARGEMENT...
                </div>
            </header>

            <form id="setup-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-4 ml-1">Sélectionnez votre
                        emplacement</label>
                    <div class="grid grid-cols-2 gap-4" id="bloc-grid">
                        <!-- Bloc options will be generated -->
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-2xl transition-all duration-300 transform active:scale-95 shadow-lg shadow-blue-900/40 flex items-center justify-center gap-2">
                        VALIDER L'INSCRIPTION
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-slate-500 text-xs">© 2026 Oncorad - Système de Gestion de Bloc</p>
        </footer>
    </div>

    <script>
        // Use crypto.randomUUID for modern browsers or a fallback
        function generateUUID() {
            return ([1e7] + -1e3 + -4e3 + -8e3 + -1e11).replace(/[018]/g, c =>
                (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
            );
        }

        async function initTablet() {
            // Check storage for existing ID
            let storedId = localStorage.getItem("device_id");
            let isExisting = !!storedId;
            let deviceId = storedId;

            if (!deviceId) {
                deviceId = typeof crypto.randomUUID === 'function' ? crypto.randomUUID() : generateUUID();
                localStorage.setItem("device_id", deviceId);
                console.log("Nouveau Device ID généré:", deviceId);
            } else {
                console.log("Device ID existant récupéré:", deviceId);
            }

            const infoBox = document.getElementById('device-info');
            infoBox.textContent = `ID: ${deviceId}`;

            // If already exists, show in fluo green immediately
            if (isExisting) {
                infoBox.classList.add('uuid-fluo');
            }

            // Generate Bloc Grid
            const grid = document.getElementById('bloc-grid');
            for (let i = 1; i <= 7; i++) {
                const blocId = `Bloc${i}`;
                const div = document.createElement('div');
                div.innerHTML = `
                    <input type="radio" name="room" id="${blocId}" value="${blocId}" class="hidden bloc-option" ${i === 1 ? 'checked' : ''}>
                    <label for="${blocId}" class="flex flex-col items-center justify-center p-5 rounded-2xl border-2 border-slate-700 bg-slate-800/40 cursor-pointer transition-all hover:border-slate-500">
                        <span class="text-xs text-slate-500 font-bold uppercase mb-1">Salle</span>
                        <span class="text-xl font-bold text-white">${i}</span>
                    </label>
                `;
                grid.appendChild(div);
            }

            // Handle Form
            document.getElementById('setup-form').onsubmit = (e) => {
                e.preventDefault();
                const selectedRoom = document.querySelector('input[name="room"]:checked').value;

                // Store choice (Keystore simulation via localStorage)
                localStorage.setItem("room_choice", selectedRoom);

                // Show fluo green for UUID on validation
                document.getElementById('device-info').classList.add('uuid-fluo');

                // Redirect
                const redirectUrl = `https://app.iotoncorad.com/bloc?room=${selectedRoom}&deviceId=${deviceId}`;
                console.log("Redirection vers:", redirectUrl);

                // Visual feedback before redirect
                const btn = e.target.querySelector('button');
                btn.innerHTML = 'INSCRIPTION EN COURS...';
                btn.classList.replace('bg-blue-600', 'bg-emerald-600');

                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 800);
            };
        }

        // Launch
        initTablet();
    </script>
</body>

</html>
