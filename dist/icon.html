<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Reference</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            padding: 40px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            color: #111827;
            margin-bottom: 30px;
            font-size: 24px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .icon-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
            background: white;
        }

        .icon-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }

        .material-icons {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .name {
            font-weight: 600;
            color: #374151;
            font-size: 14px;
            margin-bottom: 5px;
            text-align: center;
        }

        .color-code {
            color: #9ca3af;
            font-family: monospace;
            font-size: 12px;
            background: #f9fafb;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .copied {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            display: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Icon & Color Reference</h1>
        <div class="grid" id="iconGrid"></div>
    </div>
    <div class="copied" id="copyToast">Copied to clipboard!</div>

    <script>
        const icons = [
            { name: 'MedicalServices', color: '#1976D2' },
            { name: 'LocalHospital', color: '#0D47A1' },
            { name: 'Stethoscope', color: '#1565C0', manualIcon: 'medical_services' }, // Fallback/Equivalent
            { name: 'Devices', color: '#1E88E5' },
            { name: 'MonitorHeart', color: '#0288D1' },
            { name: 'Bed', color: '#43A047' },
            { name: 'Patient', color: '#4CAF50', manualIcon: 'personal_injury' }, // Fallback
            { name: 'Person', color: '#66BB6A' },
            { name: 'Groups', color: '#2E7D32' },
            { name: 'UserCheck', color: '#388E3C', manualIcon: 'how_to_reg' }, // Equivalent
            { name: 'Nurse', color: '#2E7D32', manualIcon: 'health_and_safety' }, // Approximate
            { name: 'Vaccines', color: '#00897B' },
            { name: 'Medication', color: '#00796B' },
            { name: 'Healing', color: '#009688' },
            { name: 'Bloodtype', color: '#C62828' },
            { name: 'Emergency', color: '#D32F2F', manualIcon: 'warning' }, // Defaulting
            { name: 'Warning', color: '#F9A825' },
            { name: 'Ambulance', color: '#B71C1C', manualIcon: 'airport_shuttle' }, // Closest in standard if ambulance missing
            { name: 'Biotech', color: '#6A1B9A' },
            { name: 'Science', color: '#5E35B1' },
            { name: 'LocalPharmacy', color: '#00695C' },
            { name: 'Inventory', color: '#546E7A' },
            { name: 'Storage', color: '#455A64' },
            { name: 'Assignment', color: '#607D8B' },
            { name: 'FactCheck', color: '#78909C' },
            { name: 'Schedule', color: '#3949AB' },
            { name: 'Room', color: '#26A69A' },
            { name: 'LocationOn', color: '#00838F' },
            { name: 'Shield', color: '#2F3D4A' },
            { name: 'Lock', color: '#37474F' }
        ];

        // Helper to convert CamelCase to snake_case for Material Icons
        function getMaterialIconName(name) {
            return name.split(/(?=[A-Z])/).join('_').toLowerCase();
        }

        const grid = document.getElementById('iconGrid');
        const toast = document.getElementById('copyToast');

        icons.forEach(item => {
            const card = document.createElement('div');
            card.className = 'icon-card';

            // Use manual mapping if provided, otherwise convert CamelCase
            const iconName = item.manualIcon || getMaterialIconName(item.name);

            card.innerHTML = `
                <span class="material-icons" style="color: ${item.color}">${iconName}</span>
                <span class="name">${item.name}</span>
                <span class="color-code">${item.color}</span>
            `;

            card.onclick = () => {
                const text = `${item.name}\t${item.color}`;
                navigator.clipboard.writeText(text);
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 2000);
            };

            grid.appendChild(card);
        });
    </script>
</body>

</html>
