<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Oxygen Monitor (Simple)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: monospace;
            padding: 20px;
        }

        .card {
            background: #333;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            border-left: 5px solid #22c55e;
        }

        .log {
            background: #000;
            padding: 10px;
            height: 150px;
            overflow-y: scroll;
            border: 1px solid #444;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <h1 class="text-2xl mb-4 text-green-400">Oxygen Monitor (Permissive)</h1>

    <div id="status" class="mb-4 text-yellow-500">Connecting...</div>

    <div class="mb-2">Activity Log (Raw)</div>
    <div id="log" class="log"></div>

    <div class="mb-2">Detected Sensors (Type: Other)</div>
    <div id="cards"></div>

    <script>
        const logEl = document.getElementById('log');
        const cardsEl = document.getElementById('cards');
        const statusEl = document.getElementById('status');
        const PORT = 8789;

        function log(msg) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.prepend(div);
            // Limit to 50 lines
            if (logEl.children.length > 50) logEl.lastChild.remove();
        }

        function wssConnect() {
            let url;
            const isSecure = window.location.protocol === 'https:';

            if (isSecure) {
                // In production HTTPS, we rely on the reverse proxy (Nginx/Traefik) to route /api/ to the backend
                // This ensures we go through the SSL layer (port 443) instead of hitting the non-SSL backend directly
                url = `wss://${window.location.host}/api/`;
            } else {
                // In development/local HTTP, we connect directly to the backend port
                url = `ws://${window.location.hostname}:${PORT}`;
            }

            console.log('Connecting to', url);
            const ws = new WebSocket(url);

            ws.onopen = () => {
                statusEl.innerText = 'Connected';
                statusEl.className = 'mb-4 text-green-500';
                log('Connected to WebSocket');
            };

            ws.onclose = () => {
                statusEl.innerText = 'Disconnected (Retrying...)';
                statusEl.className = 'mb-4 text-red-500';
                log('Disconnected');
                setTimeout(wssConnect, 3000);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);

                    if (msg.type === 'mqtt_message') {
                        // Log topic
                        // console.log('MQTT Message:', msg); 
                        // Only log if it's relevant to avoid spam

                        // Look for data array inside payload
                        let dataArray = [];

                        // Handle various payload structures
                        if (Array.isArray(msg.data)) {
                            dataArray = msg.data;
                        } else if (typeof msg.data === 'object' && msg.data !== null) {
                            if (msg.data.raw && msg.data.raw.data && Array.isArray(msg.data.raw.data)) {
                                dataArray = msg.data.raw.data;
                            } else if (msg.data.data && msg.data.data.data && Array.isArray(msg.data.data.data)) {
                                dataArray = msg.data.data.data;
                            } else if (msg.data.data && Array.isArray(msg.data.data)) {
                                dataArray = msg.data.data;
                            }
                        } else if (msg.payload && Array.isArray(msg.payload)) {
                            dataArray = msg.payload;
                        }

                        const items = dataArray.filter(d => {
                            // Must be type 'other'
                            if (d.type !== 'other') return false;

                            // Must have raw_data to be useful
                            if (!d.raw_data) return false;

                            // Must contain the specific oxygen sensor pattern header
                            // Pattern: 071601ea
                            return d.raw_data.includes('071601ea');
                        });

                        if (items.length > 0) {
                            log(`Found ${items.length} matched sensor(s)`);
                            items.forEach(item => {
                                updateCard(item);
                            });
                        }
                    }
                } catch (e) {
                    console.error(e);
                }
            };
        }

        function decodeRaw(raw) {
            // Updated Logic to match Backend Fix (4 bytes = 4 valves)
            // Pattern: 071601ea 01 01 01 01 (Byte0 Byte1 Byte2 Byte3)
            const header = '071601ea';
            const index = raw.indexOf(header);

            if (index === -1) return null;

            // Extract Status Payload (4 bytes = 8 hex chars)
            const dataHex = raw.substring(index + header.length, index + header.length + 8);

            // Parse separate bytes
            const val1 = parseInt(dataHex.substring(0, 2), 16);
            const val2 = parseInt(dataHex.substring(2, 4), 16);
            const val3 = parseInt(dataHex.substring(4, 6), 16);
            const val4 = parseInt(dataHex.substring(6, 8), 16);

            return {
                input1: val1 === 1, // Green/White
                input2: val2 === 1, // Green
                input3: val3 === 1, // Blue/White
                input4: val4 === 1  // Blue
            };
        }

        const sensorCounts = {}; // Store counters { mac: { input1: 0, ... } }

        function updateCard(item) {
            const id = item.mac;
            const raw = item.raw_data || 'N/A';
            const decoded = decodeRaw(raw);

            // Init counters
            if (!sensorCounts[id]) {
                sensorCounts[id] = { total: 0, input1: 0, input2: 0, input3: 0, input4: 0 };
            }

            // Update total counter
            sensorCounts[id].total++;

            // Update counters if input is ACTIVE
            if (decoded) {
                if (decoded.input1) sensorCounts[id].input1++;
                if (decoded.input2) sensorCounts[id].input2++;
                if (decoded.input3) sensorCounts[id].input3++;
                if (decoded.input4) sensorCounts[id].input4++;
            }

            const counts = sensorCounts[id];

            // Console log the match as requested
            console.log('MATCH:', { mac: id, raw_data: raw, decoded, counts });
            log(`MATCH: MAC=${id} (#${counts.total})`);

            let card = document.getElementById(`card-${id}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `card-${id}`;
                card.className = 'card';
                cardsEl.prepend(card);
            }

            let statusHtml = '';
            if (decoded) {
                statusHtml = `
                <div class="mt-3 grid grid-cols-2 gap-2 text-sm">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full ${decoded.input1 ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-gray-700'}"></div>
                        <span class="text-gray-300">Green/White <span class="text-xs text-gray-500 ml-1">(${counts.input1})</span></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full ${decoded.input2 ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-gray-700'}"></div>
                        <span class="text-gray-300">Green <span class="text-xs text-gray-500 ml-1">(${counts.input2})</span></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full ${decoded.input3 ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-gray-700'}"></div>
                        <span class="text-gray-300">Blue/White <span class="text-xs text-gray-500 ml-1">(${counts.input3})</span></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full ${decoded.input4 ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-gray-700'}"></div>
                        <span class="text-gray-300">Blue <span class="text-xs text-gray-500 ml-1">(${counts.input4})</span></span>
                    </div>
                </div>`;
            } else {
                statusHtml = '<div class="mt-2 text-red-400 text-xs">Failed to decode raw data</div>';
            }

            card.innerHTML = `
                <div class="font-bold text-lg text-white">MAC: ${id} <span class="text-sm text-yellow-500 ml-2">(${counts.total})</span></div>
                <div class="text-gray-400 text-xs mb-1">Raw Data:</div>
                <div class="font-mono text-green-300 break-all text-xs">${raw}</div>
                ${statusHtml}
                <div class="text-xs text-gray-500 mt-2 text-right">${new Date().toLocaleTimeString()}</div>
            `;

            // Highlight
            card.style.backgroundColor = '#444';
            setTimeout(() => card.style.backgroundColor = '#333', 200);
        }

        wssConnect();
    </script>
</body>

</html>
